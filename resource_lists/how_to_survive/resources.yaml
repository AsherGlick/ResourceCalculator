recipe_types:
  Crafting: Combine {IN_ITEMS} to craft {OUT_ITEM}
  Crafting (up to): Combine up to {IN_ITEMS} to craft up to {OUT_ITEM} (keeping the remainder)
  Crafting (up to, DLC): Combine up to {IN_ITEMS} to craft up to {OUT_ITEM} (keeping the remainder, DLC skill only)
  Crafting (cut): Combine {IN_ITEMS} with a sharp weapon to craft {OUT_ITEM} (keeping the sharp weapon)
  Crafting (container): Combine {IN_ITEMS} to transfer 1 gallon to {OUT_ITEM} (keeping the remainder)
  Crafting (quest): Bring {IN_ITEMS} to the appropriate questgiver to craft {OUT_ITEM}
  Crafting (Abby): Combine {IN_ITEMS} to craft {OUT_ITEM} (Abby only)
  Crafting (Kenji): Combine {IN_ITEMS} to craft {OUT_ITEM} (Kenji only)
  Crafting (Nina): Combine {IN_ITEMS} to craft {OUT_ITEM} (Nina only)
  Crafting (Jack): Combine {IN_ITEMS} to craft {OUT_ITEM} (Jack only)
  Crafting (Abby & Kenji): Combine {IN_ITEMS} to craft {OUT_ITEM} (Abby & Kenji only)
  Crafting (Abby & Jack): Combine {IN_ITEMS} to craft {OUT_ITEM} (Abby & Jack only)
  Cooking: Use {IN_ITEMS} at a fire pit to make {OUT_ITEM}
  Cooking (compressor): Combine {IN_ITEMS} to make {OUT_ITEM} (keeping the compression tank)

