recipe_types:
  Build: Use {IN_ITEMS} at the workbench to build {OUT_ITEM}
  Recycle: Recycle {IN_ITEMS} at the workbench into {OUT_ITEM}
  Salvage: Salvage {IN_ITEMS} to get {OUT_ITEM}

  Buy: Spend {IN_ITEMS} at a Krell-Mart to buy {OUT_ITEM}
  Buy (Depth 1): Spend {IN_ITEMS} at a depth 1 Krell-Mart to buy {OUT_ITEM}
  Buy (Depth 2): Spend {IN_ITEMS} at a depth 2 Krell-Mart to buy {OUT_ITEM}
  Buy (Depth 3): Spend {IN_ITEMS} at a depth 3 Krell-Mart to buy {OUT_ITEM}
  Buy (Depth 4): Spend {IN_ITEMS} at a depth 4 Krell-Mart to buy {OUT_ITEM}
  Buy (Depth 5): Spend {IN_ITEMS} at a depth 5 Krell-Mart to buy {OUT_ITEM}

  Sell (Depth 1): Sell {IN_ITEMS} at a depth 1 Krell-Mart to get {OUT_ITEM}
  Sell (Depth 2): Sell {IN_ITEMS} at a depth 2 Krell-Mart to get {OUT_ITEM}
  Sell (Depth 3): Sell {IN_ITEMS} at a depth 3 Krell-Mart to get {OUT_ITEM}
  Sell (Depth 4): Sell {IN_ITEMS} at a depth 4 Krell-Mart to get {OUT_ITEM}
  Sell (Depth 5): Sell {IN_ITEMS} at a depth 5 Krell-Mart to get {OUT_ITEM}

  Upgrade (FIX): Upgrade {IN_ITEMS} in a FIX room to get {OUT_ITEM}
  Recycle (GARB): Recycle {IN_ITEMS} in a GARB room to get {OUT_ITEM}

