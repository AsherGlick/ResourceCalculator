  Based on
  https://sonsoftheforest.wiki.gg/wiki/Prefab_Buildings
  https://sonsoftheforest.wiki.gg/wiki/Category:Items
  https://sonsoftheforest.wiki.gg/wiki/Inventory
  https://sonsoftheforest.wiki.gg/wiki/Consumables

recipe_types:
  Crafting: Use in your inventory to turn {IN_ITEMS} into {OUT_ITEM}
  Crafting (can opener): Use with a can opener in your inventory to turn {IN_ITEMS} into {OUT_ITEM}
  Upgrading: Use your inventory to add {OUT_ITEM} to a weapon using {IN_ITEMS} (weapon will not be consumed, not all weapons are applicable)
  Cooking (fire): Use {IN_ITEMS} at a fire to turn them into {OUT_ITEM}
  Cooking (drying rack): Leave {IN_ITEMS} on a drying rack over time to turn them into {OUT_ITEM}
  Cooking (spoil): Leave {IN_ITEMS} out over time to turn them into {OUT_ITEM}
  Cooking (stew): Use with a cooking pot and fire to turn {IN_ITEMS} into {OUT_ITEM}
  Prefab Building: Place blueprint(s) and fill in to turn {IN_ITEMS} into {OUT_ITEM}
  3D Printing: Use {IN_ITEMS} at a 3D printer to make {OUT_ITEM}

