recipe_types:
  Crafting: Use {IN_ITEMS} in your inventory to turn into {OUT_ITEM}
  Crafting (utility knife): Use {IN_ITEMS} with a utility knife to turn into {OUT_ITEM}
  Crafting (can opener): Use {IN_ITEMS} with a can opener to turn into {OUT_ITEM}
  Crafting (3D printer): Use {IN_ITEMS} at a 3D printer to make {OUT_ITEM}
  Crafting (axe): Use an axe to turn {IN_ITEMS} into {OUT_ITEM} (and more when applicable)
  Crafting (armor plater): Use {IN_ITEMS} at an armor plater to turn them into {OUT_ITEM}
  Cooking (fire): Use {IN_ITEMS} at a fire to turn them into {OUT_ITEM}
  Cooking (drying rack): Leave {IN_ITEMS} on a drying rack over time to turn them into {OUT_ITEM}
  Cooking (spoil): Leave {IN_ITEMS} out over time to turn them into {OUT_ITEM}
  Cooking (stew): Use with a cooking pot and fire to turn {IN_ITEMS} into {OUT_ITEM}
  Building (prefab): Place blueprint(s) and fill in to turn {IN_ITEMS} into {OUT_ITEM}
  # Upgrading: Use your inventory to add {OUT_ITEM} to a weapon using {IN_ITEMS} (weapon will not be consumed, not all weapons are applicable)

